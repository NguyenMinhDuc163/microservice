# spring.application.name=leaverequestservice
# Server
server.port=8081

# Spring Application
spring.application.name=LeaveRequestsService

# Datasource (MySQL container)
spring.datasource.url=jdbc:mysql://mysql:3306/leave_request_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# Feign Clients
feign.client.config.default.connectTimeout=5000
feign.client.config.default.readTimeout=5000
